name: release

on:
  push:
    tags:
      # Strict semver: vMAJOR.MINOR.PATCH and vMAJOR.MINOR.PATCH-PRERELEASE.
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          name="armup-${GITHUB_REF_NAME}-${GOOS}-${GOARCH}"
          mkdir -p "dist/${name}"
          go build -trimpath -ldflags='-s -w' -o "dist/${name}/armup" ./cmd/armup
          cp LICENSE README.md "dist/${name}/"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"

      - uses: actions/upload-artifact@v4
        with:
          name: armup-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: dist
        run: sha256sum *.tar.gz > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
