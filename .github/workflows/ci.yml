name: ci

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: go vet
        run: go vet ./...

      - name: gofmt -d (must be empty)
        if: matrix.os != 'windows-latest'
        run: |
          out=$(gofmt -d -s .)
          if [ -n "$out" ]; then
            echo "$out"
            echo "::error::gofmt found unformatted files"
            exit 1
          fi

      - name: go test -race
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: cross-compile sanity
        run: |
          set -e
          for triple in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${triple%/*}"
            arch="${triple#*/}"
            echo "==> $triple"
            GOOS=$os GOARCH=$arch go build ./...
          done
